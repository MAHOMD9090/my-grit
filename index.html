<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRIT - Build Unstoppable Momentum</title>
    <!-- الموارد الخارجية للأيقونات، الرسوم البيانية ومؤثرات الاحتفال -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- بنر الإشعارات الفورية -->
        <div class="notification-toast" id="notificationToast">
            <i data-lucide="bell-ring"></i>
            <div class="notification-text">
                <h5 id="notifTitle">Notification</h5>
                <p id="notifBody">Details...</p>
            </div>
        </div>

        <!-- الهيدر العلوي وشارة الأيام المتتالية -->
        <header>
            <div class="logo-area">
                <h1>Grit</h1>
            </div>
            <div class="streak-badge">
                <i data-lucide="flame" style="width: 18px; height: 18px; fill: var(--accent);"></i>
                <span id="streakCount">0</span> Days
            </div>
        </header>

        <!-- منطقة العرض الرئيسية -->
        <main>
            <!-- واجهة اليوم -->
            <div id="view-today" class="view-panel active">
                <div class="hero-metric-card">
                    <div class="hero-grid">
                        <div class="metric-box">
                            <h3>Grit Score</h3>
                            <p id="gritScore">0</p>
                        </div>
                        <div class="metric-box">
                            <h3>Completed</h3>
                            <p id="completionRatio">0/0</p>
                        </div>
                    </div>
                </div>

                <div class="section-header">
                    <h2>Today's Protocol</h2>
                    <button class="btn-action-sm" onclick="openModal('task')"><i data-lucide="plus" style="width:16px;"></i> Add Task</button>
                </div>

                <div class="item-list" id="taskList"></div>
            </div>

            <!-- واجهة الأهداف -->
            <div id="view-goals" class="view-panel">
                <div class="section-header">
                    <h2>Active Milestones</h2>
                    <button class="btn-action-sm" onclick="openModal('goal')"><i data-lucide="plus" style="width:16px;"></i> New Goal</button>
                </div>
                <div class="item-list" id="goalList"></div>
            </div>

            <!-- واجهة التحليلات والأوسمة وإدارة الملف الخارجي -->
            <div id="view-analytics" class="view-panel">
                <div class="section-header">
                    <h2>Performance Velocity</h2>
                </div>
                <div class="chart-container">
                    <canvas id="analyticsChart"></canvas>
                </div>

                <!-- نظام التحكم في الملف الخارجي لقاعدة البيانات -->
                <div class="section-header" style="margin-top: 24px;">
                    <h2>External Data Sync</h2>
                </div>
                <div class="backup-zone">
                    <button class="btn-backup" onclick="exportDataToFile()">
                        <i data-lucide="download"></i> Export Data File
                    </button>
                    <label class="btn-backup upload-label">
                        <i data-lucide="upload"></i> Import Data File
                        <input type="file" id="importFileHandler" accept=".json" onchange="importDataFromFile(event)" style="display:none;">
                    </label>
                </div>
                
                <div class="section-header" style="margin-top: 24px;">
                    <h2>Earned Badges</h2>
                </div>
                <div class="achievements-grid" id="achievementsGrid"></div>
            </div>
        </main>

        <!-- شريط التنقل السفلي -->
        <nav class="tab-bar">
            <button class="tab-item active" onclick="switchView('today', this)">
                <i data-lucide="check-square"></i>
                Today
            </button>
            <button class="tab-item" onclick="switchView('goals', this)">
                <i data-lucide="target"></i>
                Goals
            </button>
            <button class="fab-btn" onclick="openModal('task')">
                <i data-lucide="plus" style="width: 28px; height: 28px;"></i>
            </button>
            <button class="tab-item" onclick="switchView('analytics', this)">
                <i data-lucide="bar-chart-2"></i>
                Analytics
            </button>
            <button class="tab-item" onclick="triggerSimulatedRemind()">
                <i data-lucide="bell"></i>
                Remind
            </button>
        </nav>

        <!-- نافذة الإدخال السفلية المنبثقة -->
        <div class="modal-overlay" id="inputModal" onclick="closeModal(event)">
            <div class="modal-sheet" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3 id="modalTitle">Create Entry</h3>
                    <button class="btn-delete" onclick="closeModal(null)"><i data-lucide="x"></i></button>
                </div>
                <form id="modalForm" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="entryType" value="task">
                    
                    <div class="input-group">
                        <label id="inputLabelName">Description</label>
                        <input type="text" id="itemName" class="input-field" placeholder="" required>
                    </div>

                    <!-- تحديد عدد الـ Steps المطور للـ Goals -->
                    <div class="input-group" id="targetValueGroup">
                        <label>Target Steps (Total Milestones)</label>
                        <input type="number" id="itemTarget" class="input-field" value="10" min="1">
                    </div>

                    <div class="input-group">
                        <label>Priority Focus</label>
                        <div class="radio-tile-group">
                            <div class="radio-tile selected" id="prio-high" onclick="setPriority('High')">High Focus</div>
                            <div class="radio-tile" id="prio-normal" onclick="setPriority('Normal')">Standard</div>
                        </div>
                        <input type="hidden" id="itemPriority" value="High">
                    </div>

                    <button type="submit" class="btn-submit">Commit to Protocol</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
